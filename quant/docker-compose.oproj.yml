# DIAGNOSTIC: only self_attn.o_proj int8 (W8A8, TritonInt8ScaledMM), rest bf16.
# Stock vLLM (no loader patch needed - o_proj loads via the generic path).
services:
  vllm:
    command: >-
      vllm serve /models/ZAYA1-8B-oproj-int8
      --served-model-name model --max-num-batched-tokens 8192 --max-num-seqs 8
      --max-model-len 60000 --mamba-cache-dtype float32 --dtype bfloat16
      --reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser zaya_xml
      --trust-remote-code
    volumes:
      - ~/models:/models:ro
