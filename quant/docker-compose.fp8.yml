# STAGED override — do NOT apply to the live stack outside a coordination window.
#
# Serves the FP8 (W8A8 e4m3) ZAYA1-8B from ~/models/ZAYA1-8B-fp8 on the
# gfx1201 stack. Apply over the base compose in a window:
#
#   docker compose -f docker-compose.yml -f quant/docker-compose.fp8.yml up -d vllm
#
# Revert by re-running plain `docker compose up -d vllm`.
services:
  vllm:
    # Local FP8 checkpoint instead of the HF bf16 repo. --max-num-seqs 16 is
    # VRAM-gated: vLLM grows the KV/mamba cache into the freed memory, but if
    # startup OOMs at 60k context, lower it (12) or reduce --max-model-len.
    command: >-
      vllm serve /models/ZAYA1-8B-fp8
      --served-model-name model
      --max-num-batched-tokens 8192
      --max-num-seqs 16
      --max-model-len 60000
      --mamba-cache-dtype float32
      --dtype bfloat16
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser zaya_xml
      --trust-remote-code
    volumes:
      # Mount the staged FP8 model read-only at /models (appended to the base
      # HF-cache mount and the ZAYA overlay mounts).
      - ~/models:/models:ro
