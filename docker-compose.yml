# Combined stack: collaborator's tuned-attention vLLM (tcclaviger/vllm22:dev) + our W4A8 kernel.
# Built by Dockerfile.combined. The base image's ENTRYPOINT is `vllm serve "$@"`, so each
# service's `command` is JUST the serve args (do NOT prefix `vllm serve`).
#
#   docker compose --profile serve   up --build   # TP=2 combined
#   docker compose --profile single  up --build   # 1 GPU, small model
#
# Copy .env.template -> .env (HF_HOME, ports). NOTE: requires a free GPU window — coordinate,
# the cards are shared. The W4A8 kernel auto-engages via the vllm.general_plugins entry point;
# the tuned attention (triton_attn default + startup autotuner) is the base's default on gfx1201.

x-combined-common: &combined-common
  build:
    context: .
    dockerfile: Dockerfile.combined
    # The W4A8 kernel is in-repo at w4a8_fp8_wmma/ (single source of truth); Dockerfile.combined
    # COPYs it from the build context and rebuilds it in-image for gfx1201.
    args:
      # Pinned by digest (not the moving `:dev` tag) — see Dockerfile.combined's header for the
      # rationale + bump procedure. Override with COMBINED_BASE_IMAGE in .env to test a newer base.
      BASE_IMAGE: ${COMBINED_BASE_IMAGE:-tcclaviger/vllm22@sha256:e2e5ffcdee14670e183843bfd16d673c6ac7202b91bb3e2b982b324431c170f3}
      GPU_ARCHS: gfx1201
      # Heterogeneous-TP proportional sharding (64:56). ON by default -- GPU-validated:
      # byte-identical to the even split, all-reduce imbalance ~75% smaller (see DIARY Act XI
      # / patches/HET_TP_HANDOFF.md). The published 298/1887 headline is this het-TP=2 baseline,
      # so the canonical :combined image bakes it. Set WITH_HET_TP=0 for an even-split build.
      WITH_HET_TP: ${WITH_HET_TP:-1}
      # ZAYA1-8B + CCA support (the `zaya` profile). ON by default so one image serves both the
      # 35B W4A8 path and ZAYA; additive (no-op for the 35B path). Set WITH_ZAYA=0 for a leaner
      # W4A8-only image (skips the CCA kernel compile). See DIARY Act XII / zaya/ZAYA_HANDOFF.md.
      WITH_ZAYA: ${WITH_ZAYA:-1}
  image: vllm22-w4a8:combined
  restart: "no"            # never auto-restart — a wedged card should stay down for log inspection
  devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri:/dev/dri
  group_add: [video]
  security_opt: [seccomp=unconfined, label=disable]
  cap_add: [SYS_PTRACE]
  ipc: host
  runtime: amd
  shm_size: "16gb"
  ports:
    - "${VLLM_HOST_PORT:-8000}:8000"
  volumes:
    - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
    # Persistent Triton cache — MANDATORY. Both Qwen3.6 variants are GDN hybrids: a cold boot
    # pays the FLA-GDN autotune compile (~15-30 min) PLUS the base's attention startup autotune.
    # This makes it one-time. Survives --rm.
    - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
    # Repo test/ harness (read-only) so the benchmark in README "Verifying / benchmarking" resolves:
    #   docker compose --profile serve run --rm --entrypoint python3 serve /workspace/test/bench_tp2.py
    - ./test:/workspace/test:ro
  environment: &combined-env
    HF_HUB_OFFLINE: "1"
    GPU_ARCHS: gfx1201
    ROCM_HOME: /opt/rocm-7.2.1
    PATH: /opt/rocm-7.2.1/lib/llvm/bin:/app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    # W4A8: the only knob you normally touch. USE=0 -> pure tuned-attention baseline
    # (clean A/B vs the W4A8 layer). The kernel auto-engages via the vllm.general_plugins
    # entry point and AUTO-TUNES its dense/MoE crossover per shape at load, caching it
    # (VLLM_ROCM_W4A8_AUTOTUNE, default on) -- so the old manual gates are gone: MOE_MIN_M
    # is intentionally UNSET (setting it would bypass the autotune crossover), and MOE=1 /
    # MOE_VERSION=6 are already baked into the image. Bisect knobs (MOE=0, FORCE, LAYOUT,
    # V6_MIN_M/_MAX_M) are documented in the README, not set here.
    VLLM_ROCM_USE_W4A8_FP8_WMMA: "${USE_W4A8:-1}"

services:
  # --- TP=2 combined: tuned attention + W4A8, both Qwen3.6 cards (64+56 CU heterogeneous) ---
  serve:
    <<: *combined-common
    profiles: ["serve"]
    container_name: vllm22-w4a8-serve
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "0,1"
      HIP_VISIBLE_DEVICES: "0,1"
      CU_NUM: "56"                       # lower of the two cards (conservative even-TP fallback).
      # Proportional het-TP weights = CU counts of the 9070 XT + 9070. Active because the image
      # builds with WITH_HET_TP=1 by default; the helper fail-safes to even if a WITH_HET_TP=0
      # image is run instead. Tune to your cards' CU ratio for a different pair.
      VLLM_TP_CU_WEIGHTS: "64,56"
    command:                             # entrypoint prepends `vllm serve`
      - ${VLLM_MODEL_ID:-cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit}
      - --host=0.0.0.0
      - --port=8000
      - --tensor-parallel-size=2
      - --limit-mm-per-prompt={"image":0,"video":0}
      - --kv-cache-dtype=fp8_per_token_head
      # Keep --max-num-batched-tokens low: the init memory-profiling forward (stock activation
      # memory) is what OOMs at large batch on 16 GB cards, not the W4A8 MoE apply (bounded by
      # MOE_APPLY_CHUNK). max-model-len only sizes KV cache.
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-4096}
      - --max-num-batched-tokens=${VLLM_MAX_BATCHED:-4096}
      - --gpu-memory-utilization=${VLLM_GPU_MEMORY_UTIL:-0.92}
      # Conservative cudagraph capture set for RDNA4/ROCm. The vLLM default (51 sizes up to 512)
      # under FULL_AND_PIECEWISE stalls/hangs capture on ROCm and wastes VRAM (vLLM #19579/#39010;
      # AMD/verl tuning guidance) — and these 16 GB cards serve low-batch anyway. Capture only the
      # batch sizes we actually hit. Override with VLLM_CUDAGRAPH_SIZES.
      - --compilation-config=${VLLM_CUDAGRAPH_SIZES:-{"cudagraph_capture_sizes":[1,2,4,8,16,32,64,128]}}

  # --- TP=2 throughput benchmark: reproduces the published 298 dec / 1887 total tok/s ---
  # One-command repro of the headline figure. Same image/devices/het-TP env as `serve`, but
  # runs test/bench_tp2.py (offline LLM API: warmup generate -> timed generate) instead of
  # `vllm serve`. Defaults to the STOCK path (USE_W4A8=0) because the published headline is the
  # stock baseline; set USE_W4A8=1 to bench the W4A8 kernel instead.
  #   ./scripts/bench.sh                          # wrapper: stamps git SHA, tees results.jsonl
  #   docker compose --profile bench run --rm bench
  bench:
    <<: *combined-common
    profiles: ["bench"]
    container_name: vllm22-w4a8-bench
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "0,1"
      HIP_VISIBLE_DEVICES: "0,1"
      CU_NUM: "56"
      VLLM_TP_CU_WEIGHTS: "64,56"
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "${USE_W4A8:-0}"   # headline = stock; flip to 1 for the kernel
      # max_model_len sizes KV cache; max_num_batched_tokens drives the init memory-profiling
      # forward (the real init-OOM lever) and is decoupled here so a large context doesn't force a
      # giant prefill forward. The W4A8 MoE apply scratch is separately bounded by MOE_APPLY_CHUNK.
      MAX_MODEL_LEN: "${MAX_MODEL_LEN:-8192}"
      MAX_NUM_BATCHED: "${MAX_NUM_BATCHED:-4096}"
      # Shipped path = graphs ON (enforce_eager is profiling-only, CONTRIBUTING). When graphs are on
      # the offline bench uses the same conservative RDNA4/ROCm capture set as the serving profiles.
      ENFORCE_EAGER: "${ENFORCE_EAGER:-0}"
      CUDAGRAPH_SIZES: "${CUDAGRAPH_SIZES:-[1,2,4,8,16,32,64,128]}"
      BENCH_GIT_SHA: "${BENCH_GIT_SHA:-unknown}"       # stamped by scripts/bench.sh for traceability
      BENCH_RESULTS_JSONL: "/workspace/bench-results/results.jsonl"
    volumes:                                           # <<: doesn't merge lists — re-list the anchor's mounts
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
      - ./test:/workspace/test:ro                      # the benchmark script
      - ./profiling/bench-results:/workspace/bench-results   # persisted JSONL results (host-visible)
    entrypoint: ["bash", "-lc"]                         # override base `vllm serve "$@"`; venv PATH for Triton JIT
    command:
      - "source /app/.venv/bin/activate && exec python /workspace/test/bench_tp2.py"

  # --- single GPU: small AWQ model for quick smoke / coherence checks ---
  single:
    <<: *combined-common
    profiles: ["single"]
    container_name: vllm22-w4a8-single
    environment:
      <<: *combined-env
      HIP_VISIBLE_DEVICES: "0"
      ROCR_VISIBLE_DEVICES: "0"
    command:
      - ${VLLM_SINGLE_MODEL_ID:-Qwen/Qwen2.5-Coder-7B-Instruct-AWQ}   # pure transformer: no FLA-GDN compile
      - --host=0.0.0.0
      - --port=8000
      - --tensor-parallel-size=1
      - --max-model-len=4096
      - --gpu-memory-utilization=0.90
      # Conservative RDNA4/ROCm cudagraph capture set (see serve; avoids ROCm capture stall + VRAM).
      - --compilation-config=${VLLM_CUDAGRAPH_SIZES:-{"cudagraph_capture_sizes":[1,2,4,8,16,32,64,128]}}

  # --- ZAYA1-8B + CCA: hybrid CCA + FP8-MoE second model on the SAME combined image ---
  # The image bakes ZAYA support (Dockerfile.combined WITH_ZAYA=1). CCA has no TP>1, so this is
  # single-card (TP=1). Put ZAYA1-8B-fp8 under $ZAYA_MODELS_DIR (mounted /models). Bring up with:
  #   docker compose --profile zaya up --build            # backend on :8001
  #   docker compose --profile zaya --profile rsa up      # + RSA test-time-compute proxy on :8100
  zaya:
    <<: *combined-common
    profiles: ["zaya"]
    container_name: vllm22-zaya
    volumes:
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      # Local ZAYA checkpoints (FP8 built by quant/quantize_fp8.py -> ZAYA1-8B-fp8).
      - ${ZAYA_MODELS_DIR:-~/models}:/models:ro
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton   # same toolchain → shared cache
    ports:
      - "${ZAYA_HOST_PORT:-8001}:8000"
    environment:
      <<: *combined-env
      # Single-GPU (TP=1): ROCR picks the physical card + re-indexes it to 0, so HIP must be 0.
      ROCR_VISIBLE_DEVICES: "${ZAYA_GPU:-0}"
      HIP_VISIBLE_DEVICES: "0"
      # ZAYA experts are FP8; the W4A8 AWQ/GPTQ kernel doesn't engage this path — leave it off.
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "${ZAYA_USE_W4A8:-0}"
      # Fused CCA kernels (decode + prefill/mixed). Default ON: GPU-validated coherent, bit-exact,
      # +38-49% decode tok/s vs eager with cudagraphs on (docs/zaya/cca-kernel-perf.md). 0 -> eager.
      ZAYA_CCA_HIP: "${ZAYA_CCA_HIP:-1}"
      ZAYA_CCA_HIP_PREFILL: "${ZAYA_CCA_HIP_PREFILL:-1}"
      ZAYA_CCA_DEBUG_PATHS: "${ZAYA_CCA_DEBUG_PATHS:-0}"
    command:                              # entrypoint prepends `vllm serve`
      - ${ZAYA_MODEL_ID:-/models/ZAYA1-8B-fp8}
      - --served-model-name=model
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --dtype=bfloat16
      - --tensor-parallel-size=1
      - --max-model-len=${ZAYA_MAX_MODEL_LEN:-32768}
      - --max-num-seqs=${ZAYA_MAX_NUM_SEQS:-16}
      - --max-num-batched-tokens=${ZAYA_MAX_BATCHED:-32768}
      - --mamba-cache-dtype=float32      # CCA conv/temporal state numerics demand float32 (Act VII)
      - --reasoning-parser=qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser=zaya_xml
      - --gpu-memory-utilization=${ZAYA_GPU_MEMORY_UTIL:-0.90}
      # Conservative RDNA4/ROCm cudagraph capture set (see serve; avoids ROCm capture stall + VRAM).
      - --compilation-config=${VLLM_CUDAGRAPH_SIZES:-{"cudagraph_capture_sizes":[1,2,4,8,16,32,64,128]}}
    healthcheck:                         # so the rsa proxy can wait for a serving backend
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s

  # --- RSA proxy: Recursive Self-Aggregation test-time compute, OpenAI-compatible shim in front
  #     of the zaya backend. Standalone, client-side, NO GPU (its own tiny image). ---
  rsa:
    build:
      context: .
      dockerfile: Dockerfile.rsa
    image: vllm22-zaya-rsa:combined
    profiles: ["rsa"]
    container_name: vllm22-zaya-rsa
    restart: "no"
    depends_on:
      zaya:
        condition: service_healthy
    ports:
      - "${RSA_HOST_PORT:-8100}:8100"
    volumes:
      - ${ZAYA_MODELS_DIR:-~/models}:/models:ro   # loads the model's HF tokenizer for token-exact tails
    command:
      - --backend=http://zaya:8000/v1
      - --host=0.0.0.0
      - --port=8100
      - --tokenizer=${ZAYA_MODEL_ID:-/models/ZAYA1-8B-fp8}
      # ZAYA1-report RSA config (N=16, K=4, T=2, tau=4096); override per-request via the `rsa` body key.
      - --rsa-n=${RSA_N:-16}
      - --rsa-k=${RSA_K:-4}
      - --rsa-t=${RSA_T:-2}
      - --rsa-tail-tokens=${RSA_TAIL:-4096}
