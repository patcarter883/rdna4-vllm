# Combined stack: collaborator's tuned-attention vLLM (tcclaviger/vllm22:dev) + our W4A8 kernel.
# Built by Dockerfile.combined. The base image's ENTRYPOINT is `vllm serve "$@"`, so each
# service's `command` is JUST the serve args (do NOT prefix `vllm serve`).
#
#   docker compose --profile serve   up --build   # TP=2 combined
#   docker compose --profile single  up --build   # 1 GPU, small model
#
# Copy .env.template -> .env (HF_HOME, ports). NOTE: requires a free GPU window — coordinate,
# the cards are shared. The W4A8 kernel auto-engages via the vllm.general_plugins entry point;
# the tuned attention (triton_attn default + startup autotuner) is the base's default on gfx1201.

x-combined-common: &combined-common
  build:
    context: .
    dockerfile: Dockerfile.combined
    # The W4A8 kernel is in-repo at w4a8_fp8_wmma/ (single source of truth); Dockerfile.combined
    # COPYs it from the build context and rebuilds it in-image for gfx1201.
    args:
      # Pinned by digest (not the moving `:dev` tag) — see Dockerfile.combined's header for the
      # rationale + bump procedure. Override with COMBINED_BASE_IMAGE in .env to test a newer base.
      BASE_IMAGE: ${COMBINED_BASE_IMAGE:-tcclaviger/vllm22@sha256:ad046fde24d9233e72790222cbac3fc24f7e47a0d28e3089c2a383422890d67a}
      GPU_ARCHS: gfx1201
      # Heterogeneous-TP proportional sharding (64:56). ON by default -- GPU-validated:
      # byte-identical to the even split, all-reduce imbalance ~75% smaller (see DIARY Act XI
      # / patches/HET_TP_HANDOFF.md). The published 298/1887 headline is this het-TP=2 baseline,
      # so the canonical :combined image bakes it. Set WITH_HET_TP=0 for an even-split build.
      WITH_HET_TP: ${WITH_HET_TP:-1}
      # ZAYA1-8B + CCA support (the `zaya` profile). ON by default so one image serves both the
      # 35B W4A8 path and ZAYA; additive (no-op for the 35B path). Set WITH_ZAYA=0 for a leaner
      # W4A8-only image (skips the CCA kernel compile). See DIARY Act XII / zaya/ZAYA_HANDOFF.md.
      WITH_ZAYA: ${WITH_ZAYA:-1}
  image: vllm22-w4a8:combined
  restart: "no"            # never auto-restart — a wedged card should stay down for log inspection
  devices:
    - /dev/kfd:/dev/kfd
    - /dev/dri:/dev/dri
  group_add: [video]
  security_opt: [seccomp=unconfined, label=disable]
  cap_add: [SYS_PTRACE]
  ipc: host
  runtime: amd
  shm_size: "16gb"
  ports:
    - "${VLLM_HOST_PORT:-8000}:8000"
  volumes:
    - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
    # Persistent Triton cache — MANDATORY. Both Qwen3.6 variants are GDN hybrids: a cold boot
    # pays the FLA-GDN autotune compile (~15-30 min) PLUS the base's attention startup autotune.
    # This makes it one-time. Survives --rm.
    - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
    # Persistent vLLM torch.compile / AOT-inductor cache. Separate from the Triton cache and NOT
    # host-persisted by default → torch.compile re-ran (~44s) every boot. Mounting it makes that
    # one-time too (keyed by compilation config, so it re-misses if you change cudagraph sizes /
    # kv-cache-dtype / the W4A8 toggle — expected).
    - ${VLLM_HOST_COMPILE_CACHE:-./.vllm-cache-combined}:/root/.cache/vllm
    # Repo test/ harness (read-only) so the benchmark in README "Verifying / benchmarking" resolves:
    #   docker compose --profile serve run --rm --entrypoint python3 serve /workspace/test/bench_tp2.py
    - ./test:/workspace/test:ro
  environment: &combined-env
    HF_HUB_OFFLINE: "0"
    GPU_ARCHS: gfx1201
    ROCM_HOME: /opt/rocm-7.2.1
    PATH: /opt/rocm-7.2.1/lib/llvm/bin:/app/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    # W4A8: the only knob you normally touch. USE=0 -> pure tuned-attention baseline
    # (clean A/B vs the W4A8 layer). The kernel auto-engages via the vllm.general_plugins
    # entry point and AUTO-TUNES its dense/MoE crossover per shape at load, caching it
    # (VLLM_ROCM_W4A8_AUTOTUNE, default on) -- so the old manual gates are gone: MOE_MIN_M
    # is intentionally UNSET (setting it would bypass the autotune crossover), and MOE=1 /
    # MOE_KERNEL=wmma are already baked into the image (MOE_KERNEL replaced the de-numbered
    # MOE_VERSION). Bisect knobs (MOE=0, FORCE, LAYOUT, MOE_KERNEL=scalar) are documented in
    # the README, not set here.
    VLLM_ROCM_USE_W4A8_FP8_WMMA: "${USE_W4A8:-1}"
    # Cold-boot compile accelerators. Thread-pool Triton @autotune parallel-compile is OFF for now:
    # on TP=2 the two ranks' pools (up to 8x2) thrash the shared /root/.triton on RDNA4 → the GDN
    # autotune livelocked (zero progress for 20+ min). Re-enable with VLLM_TRITON_PARALLEL_COMPILE=1
    # once the shared-cache contention is fixed (flock+atomic, or build-time bake). The attention
    # autotuner pre-warm (process pool, VLLM_ATTN_AUTOTUNE_PARALLEL) stays default-ON — it's fine.
    VLLM_TRITON_PARALLEL_COMPILE: "${VLLM_TRITON_PARALLEL_COMPILE:-0}"
    # Attention autotuner pre-warm (process pool) also OFF for now — on TP=2 each rank spawns its
    # own pool, another contention source during startup. Fully serial startup while we isolate the
    # boot-time cost. Re-enable (=1) once the shared-cache contention is fixed.
    VLLM_ATTN_AUTOTUNE_PARALLEL: "${VLLM_ATTN_AUTOTUNE_PARALLEL:-0}"
    # Persist Triton @triton.autotune RESULTS (the GDN/FLA chunk_* sweep that dominates the boot,
    # ~22 min) to disk so a same-config restart skips re-benchmarking. cache_results then writes
    # <kernel>.autotune.json into TRITON_CACHE_DIR (=/root/.triton, mounted). The cache_key includes
    # env vars, so the FIRST boot after any env/config change re-tunes once, then subsequent boots
    # hit it. This is the "use the cache next start" guarantee.
    TRITON_CACHE_AUTOTUNING: "${TRITON_CACHE_AUTOTUNING:-1}"
    VLLM_ROCM_W4A8_LAYOUT: "${VLLM_ROCM_W4A8_LAYOUT:-single}"

services:
  # --- TP=2 combined: tuned attention + W4A8, both Qwen3.6 cards (64+56 CU heterogeneous) ---
  serve:
    <<: *combined-common
    profiles: ["serve"]
    container_name: ${LEASE_NAME:-vllm22-w4a8}-serve   # gpu-lease sets LEASE_NAME so two leases don't collide
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"   # gpu-lease injects its leased physical card set
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"     # …and the 0-based re-index of it
      CU_NUM: "56"                       # lower of the two cards (conservative even-TP fallback).
      # Proportional het-TP weights = CU counts of the 9070 XT + 9070. Active because the image
      # builds with WITH_HET_TP=1 by default; the helper fail-safes to even if a WITH_HET_TP=0
      # image is run instead. Tune to your cards' CU ratio for a different pair.
      #VLLM_TP_CU_WEIGHTS: "64,56"
      VLLM_TP_CU_WEIGHTS: "50,50"
      VLLM_ROCM_W4A8_LAYOUT: "${VLLM_ROCM_W4A8_LAYOUT:-single}"
    restart: unless-stopped
    command:                             # entrypoint prepends `vllm serve`
      - ${VLLM_MODEL_ID:-cyankiwi/Qwen3.6-27B-AWQ-INT4}
      - --host=0.0.0.0
      - --port=8000
      - --tensor-parallel-size=2
      - --limit-mm-per-prompt={"image":0,"video":0}
      - --kv-cache-dtype=fp8
      - --enable-prefix-caching
      - --reasoning-parser=qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser=qwen3_xml
      # Keep --max-num-batched-tokens low: the init memory-profiling forward (stock activation
      # memory) is what OOMs at large batch on 16 GB cards, not the W4A8 MoE apply (bounded by
      # MOE_APPLY_CHUNK). max-model-len only sizes KV cache.
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-50000}
      - --max-num-batched-tokens=${VLLM_MAX_BATCHED:-4096}
      # GDN/Mamba hybrid: each decode seq needs one Mamba state-cache block, and only ~36 fit at
      # this memory budget on 16 GB TP=2. Cap concurrency at/below that (vLLM trims cudagraph
      # capture sizes to <= max_num_seqs automatically). Raise with more VRAM / higher util.
      - --max-num-seqs=${VLLM_MAX_NUM_SEQS:-8}
      - --gpu-memory-utilization=${VLLM_GPU_MEMORY_UTIL:-0.95}
      # Conservative cudagraph capture set for RDNA4/ROCm. The vLLM default (51 sizes up to 512)
      # under FULL_AND_PIECEWISE stalls/hangs capture on ROCm and wastes VRAM (vLLM #19579/#39010;
      # AMD/verl tuning guidance) — and these 16 GB cards serve low-batch anyway. Capture only the
      # batch sizes we actually hit. Override with VLLM_CUDAGRAPH_SIZES.
      - --compilation-config=${VLLM_CUDAGRAPH_SIZES:-{"cudagraph_capture_sizes":[1,2,4,8,16,32,64]}}
      - --trust-remote-code
      - --enable-prompt-tokens-details

  serve-northcode:
    <<: *combined-common
    profiles: ["serve-northcode"]
    container_name: ${LEASE_NAME:-vllm22-w4a8}-northcode   # gpu-lease sets LEASE_NAME so two leases don't collide
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"   # gpu-lease injects its leased physical card set
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"     # …and the 0-based re-index of it
      CU_NUM: "56"                       # lower of the two cards (conservative even-TP fallback).
      # Proportional het-TP weights = CU counts of the 9070 XT + 9070. Active because the image
      # builds with WITH_HET_TP=1 by default; the helper fail-safes to even if a WITH_HET_TP=0
      # image is run instead. Tune to your cards' CU ratio for a different pair.
      VLLM_TP_CU_WEIGHTS: "64,56"
    restart: unless-stopped
    command:                             # entrypoint prepends `vllm serve`
      - ${VLLM_MODEL_ID:-CohereLabs/North-Mini-Code-1.0-w4a16}
      - --host=0.0.0.0
      - --port=8000
      - --tensor-parallel-size=2
      - --limit-mm-per-prompt={"image":0,"video":0}
      - --kv-cache-dtype=fp8
      - --enable-prefix-caching
      - --reasoning-parser=cohere_command4
      - --enable-auto-tool-choice
      - --tool-call-parser=cohere_command4
      # Keep --max-num-batched-tokens low: the init memory-profiling forward (stock activation
      # memory) is what OOMs at large batch on 16 GB cards, not the W4A8 MoE apply (bounded by
      # MOE_APPLY_CHUNK). max-model-len only sizes KV cache.
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-50000}
      - --max-num-batched-tokens=${VLLM_MAX_BATCHED:-4096}
      # GDN/Mamba hybrid: each decode seq needs one Mamba state-cache block, and only ~36 fit at
      # this memory budget on 16 GB TP=2. Cap concurrency at/below that (vLLM trims cudagraph
      # capture sizes to <= max_num_seqs automatically). Raise with more VRAM / higher util.
      - --max-num-seqs=${VLLM_MAX_NUM_SEQS:-8}
      - --gpu-memory-utilization=${VLLM_GPU_MEMORY_UTIL:-0.90}
      # Conservative cudagraph capture set for RDNA4/ROCm. The vLLM default (51 sizes up to 512)
      # under FULL_AND_PIECEWISE stalls/hangs capture on ROCm and wastes VRAM (vLLM #19579/#39010;
      # AMD/verl tuning guidance) — and these 16 GB cards serve low-batch anyway. Capture only the
      # batch sizes we actually hit. Override with VLLM_CUDAGRAPH_SIZES.
      - --compilation-config=${VLLM_CUDAGRAPH_SIZES:-{"cudagraph_capture_sizes":[1,2,4,8,16,32,64]}}

  serve-laguna:
    <<: *combined-common
    profiles: ["serve-laguna"]
    container_name: ${LEASE_NAME:-vllm22-w4a8}-laguna   # gpu-lease sets LEASE_NAME so two leases don't collide
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"   # gpu-lease injects its leased physical card set
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"     # …and the 0-based re-index of it
      CU_NUM: "56"                       # lower of the two cards (conservative even-TP fallback).
      # Proportional het-TP weights = CU counts of the 9070 XT + 9070. Active because the image
      # builds with WITH_HET_TP=1 by default; the helper fail-safes to even if a WITH_HET_TP=0
      # image is run instead. Tune to your cards' CU ratio for a different pair.
      VLLM_TP_CU_WEIGHTS: "64,56"
    restart: unless-stopped
    command:                             # entrypoint prepends `vllm serve`
      - ${VLLM_MODEL_ID:-poolside/Laguna-XS.2-INT4}
      - --host=0.0.0.0
      - --port=8000
      - --tensor-parallel-size=2
      - --limit-mm-per-prompt={"image":0,"video":0}
      - --kv-cache-dtype=fp8
      - --enable-prefix-caching
      - --reasoning-parser=poolside_v1
      - --enable-auto-tool-choice
      - --tool-call-parser=poolside_v1
      # Keep --max-num-batched-tokens low: the init memory-profiling forward (stock activation
      # memory) is what OOMs at large batch on 16 GB cards, not the W4A8 MoE apply (bounded by
      # MOE_APPLY_CHUNK). max-model-len only sizes KV cache.
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-50000}
      - --max-num-batched-tokens=${VLLM_MAX_BATCHED:-4096}
      # GDN/Mamba hybrid: each decode seq needs one Mamba state-cache block, and only ~36 fit at
      # this memory budget on 16 GB TP=2. Cap concurrency at/below that (vLLM trims cudagraph
      # capture sizes to <= max_num_seqs automatically). Raise with more VRAM / higher util.
      - --max-num-seqs=${VLLM_MAX_NUM_SEQS:-8}
      - --gpu-memory-utilization=${VLLM_GPU_MEMORY_UTIL:-0.90}
      # Conservative cudagraph capture set for RDNA4/ROCm. The vLLM default (51 sizes up to 512)
      # under FULL_AND_PIECEWISE stalls/hangs capture on ROCm and wastes VRAM (vLLM #19579/#39010;
      # AMD/verl tuning guidance) — and these 16 GB cards serve low-batch anyway. Capture only the
      # batch sizes we actually hit. Override with VLLM_CUDAGRAPH_SIZES.
      - --compilation-config=${VLLM_CUDAGRAPH_SIZES:-{"cudagraph_capture_sizes":[1,2,4,8,16,32,64]}}

  # --- TP=2 throughput benchmark: reproduces the published 298 dec / 1887 total tok/s ---
  # One-command repro of the headline figure. Same image/devices/het-TP env as `serve`, but
  # runs test/bench_tp2.py (offline LLM API: warmup generate -> timed generate) instead of
  # `vllm serve`. Defaults to the STOCK path (USE_W4A8=0) because the published headline is the
  # stock baseline; set USE_W4A8=1 to bench the W4A8 kernel instead.
  #   ./scripts/bench.sh                          # wrapper: stamps git SHA, tees results.jsonl
  #   docker compose --profile bench run --rm bench
  bench:
    <<: *combined-common
    profiles: ["bench"]
    container_name: ${LEASE_NAME:-vllm22-w4a8}-bench   # gpu-lease sets LEASE_NAME so two leases don't collide
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"   # gpu-lease injects its leased physical card set
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"     # …and the 0-based re-index of it
      CU_NUM: "56"
      VLLM_TP_CU_WEIGHTS: "64,56"
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "${USE_W4A8:-0}"   # headline = stock; flip to 1 for the kernel
      # max_model_len sizes KV cache; max_num_batched_tokens drives the init memory-profiling
      # forward (the real init-OOM lever) and is decoupled here so a large context doesn't force a
      # giant prefill forward. The W4A8 MoE apply scratch is separately bounded by MOE_APPLY_CHUNK.
      MAX_MODEL_LEN: "${MAX_MODEL_LEN:-4096}"
      MAX_NUM_BATCHED: "${MAX_NUM_BATCHED:-4096}"
      MAX_NUM_SEQS: "${MAX_NUM_SEQS:-32}"   # GDN/Mamba: <=~36 blocks on 16GB; cudagraph trims to this
      # Shipped path = graphs ON (enforce_eager is profiling-only, CONTRIBUTING). When graphs are on
      # the offline bench uses the same conservative RDNA4/ROCm capture set as the serving profiles.
      ENFORCE_EAGER: "${ENFORCE_EAGER:-0}"
      CUDAGRAPH_SIZES: "${CUDAGRAPH_SIZES:-[1,2,4,8,16,32,64]}"
      BENCH_GIT_SHA: "${BENCH_GIT_SHA:-unknown}"       # stamped by scripts/bench.sh for traceability
      BENCH_RESULTS_JSONL: "/workspace/bench-results/results.jsonl"
    volumes:                                           # <<: doesn't merge lists — re-list the anchor's mounts
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
      - ${VLLM_HOST_COMPILE_CACHE:-./.vllm-cache-combined}:/root/.cache/vllm
      - ./test:/workspace/test:ro                      # the benchmark script
      - ./profiling/bench-results:/workspace/bench-results   # persisted JSONL results (host-visible)
    entrypoint: ["bash", "-lc"]                         # override base `vllm serve "$@"`; venv PATH for Triton JIT
    command:
      - "source /app/.venv/bin/activate && exec python /workspace/test/bench_tp2.py"

  # --- TP=2 offline bench for the consolidated kernels: same as `bench` but on the :tiled image
  #     with W4A8 engaged; toggle VLLM_W4A8_MOE_TILED 0 (originals) vs 1 (consolidated) for the A/B.
  #       scripts/gpu-lease.sh -n 2 --name benchtiled -- \
  #         docker compose --profile benchtiled run --rm -e VLLM_W4A8_MOE_TILED=1 benchtiled
  benchtiled:
    <<: *combined-common
    profiles: ["benchtiled"]
    image: vllm22-w4a8:tiled
    container_name: vllm22-w4a8-benchtiled
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"
      CU_NUM: "56"
      VLLM_TP_CU_WEIGHTS: "64,56"
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "1"                  # engage the W4A8 MoE kernel (the path under test)
      VLLM_W4A8_MOE_TILED: "${VLLM_W4A8_MOE_TILED:-0}"  # 0 = original v5/v6 ; 1 = consolidated tiled
      MODEL: "${MODEL:-cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit}"
      N_PROMPTS: "${N_PROMPTS:-32}"
      OUT_TOKENS: "${OUT_TOKENS:-128}"
      GPU_MEM_UTIL: "${GPU_MEM_UTIL:-0.90}"
      MAX_MODEL_LEN: "${MAX_MODEL_LEN:-4096}"
      MAX_NUM_BATCHED: "${MAX_NUM_BATCHED:-4096}"
      MAX_NUM_SEQS: "${MAX_NUM_SEQS:-32}"
      ENFORCE_EAGER: "${ENFORCE_EAGER:-0}"
      CUDAGRAPH_SIZES: "${CUDAGRAPH_SIZES:-[1,2,4,8,16,32,64]}"
      BENCH_RESULTS_JSONL: "/workspace/bench-results/results.jsonl"
    volumes:                                            # <<: doesn't merge lists — re-list
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
      - ${VLLM_HOST_COMPILE_CACHE:-./.vllm-cache-combined}:/root/.cache/vllm
      - ./test:/workspace/test:ro
      - ./profiling/bench-results:/workspace/bench-results
    entrypoint: ["bash", "-lc"]
    command:
      - "source /app/.venv/bin/activate && exec python /workspace/test/bench_tp2.py"

  # --- 1-GPU MoE correctness test for the consolidated TileConfig kernels (feat/w4a8-tile-autotune).
  #     Runs test_moe_correctness.py (v5/v6 vs fp8 reference) in the :tiled image with the
  #     VLLM_W4A8_MOE_TILED dispatch on, confirming the consolidated path is correct through the
  #     real torch op. Launch under a 1-card lease:
  #       scripts/gpu-lease.sh -n 1 --name moetest -- docker compose --profile moetest run --rm moetest
  moetest:
    <<: *combined-common
    profiles: ["moetest"]
    image: vllm22-w4a8:tiled
    container_name: vllm22-w4a8-moetest
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0}"
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0}"
      VLLM_W4A8_MOE_TILED: "${VLLM_W4A8_MOE_TILED:-1}"   # =1 -> consolidated kernels; unset -> originals
    volumes:                                             # <<: doesn't merge lists — re-list
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
      # mount ONLY the test file (not the source pkg dir) so `import w4a8_fp8_wmma` resolves to the
      # INSTALLED venv package (with _C.so), not the source tree (no compiled _C → circular import).
      - ./w4a8_fp8_wmma/test_moe_correctness.py:/workspace/test_moe_correctness.py:ro
    entrypoint: ["bash", "-lc"]
    command:
      - "source /app/.venv/bin/activate && cd /workspace && exec python test_moe_correctness.py"

  # --- single GPU: small AWQ model for quick smoke / coherence checks ---
  single:
    <<: *combined-common
    profiles: ["single"]
    container_name: ${LEASE_NAME:-vllm22-w4a8}-single   # gpu-lease sets LEASE_NAME so two leases don't collide
    environment:
      <<: *combined-env
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0}"      # gpu-lease injects the 0-based re-index
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0}"    # …and the leased physical card (e.g. "1")
    command:
      - ${VLLM_SINGLE_MODEL_ID:-Qwen/Qwen2.5-Coder-7B-Instruct-AWQ}   # pure transformer: no FLA-GDN compile
      - --host=0.0.0.0
      - --port=8000
      - --tensor-parallel-size=1
      - --max-model-len=4096
      - --gpu-memory-utilization=0.90
      # Conservative RDNA4/ROCm cudagraph capture set (see serve; avoids ROCm capture stall + VRAM).
      - --compilation-config=${VLLM_CUDAGRAPH_SIZES:-{"cudagraph_capture_sizes":[1,2,4,8,16,32,64]}}

  # --- ZAYA1-8B + CCA: hybrid CCA + FP8-MoE second model on the SAME combined image ---
  # The image bakes ZAYA support (Dockerfile.combined WITH_ZAYA=1). CCA has no TP>1, so this is
  # single-card (TP=1). Put ZAYA1-8B-fp8 under $ZAYA_MODELS_DIR (mounted /models). Bring up with:
  #   docker compose --profile zaya up --build            # backend on :8001
  #   docker compose --profile zaya --profile rsa up      # + RSA test-time-compute proxy on :8100
  zaya:
    <<: *combined-common
    profiles: ["zaya"]
    container_name: ${LEASE_NAME:-vllm22}-zaya   # gpu-lease sets LEASE_NAME so two leases don't collide
    volumes:
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      # Local ZAYA checkpoints (FP8 built by quant/quantize_fp8.py -> ZAYA1-8B-fp8).
      - ${ZAYA_MODELS_DIR:-~/models}:/models:ro
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton   # same toolchain → shared cache
    ports:
      - "${ZAYA_HOST_PORT:-8000}:8000"
    environment:
      <<: *combined-env
      # Single-GPU (TP=1): ROCR picks the physical card + re-indexes it to 0, so HIP must be 0.
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"   # gpu-lease injects its leased physical card set
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"
      # ZAYA experts are FP8; the W4A8 AWQ/GPTQ kernel doesn't engage this path — leave it off.
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "${ZAYA_USE_W4A8:-1}"
      # Fused CCA kernels (decode + prefill/mixed). Default ON: GPU-validated coherent, bit-exact,
      # +38-49% decode tok/s vs eager with cudagraphs on (docs/zaya/cca-kernel-perf.md). 0 -> eager.
      ZAYA_CCA_HIP: "${ZAYA_CCA_HIP:-1}"
      ZAYA_CCA_HIP_PREFILL: "${ZAYA_CCA_HIP_PREFILL:-1}"
      ZAYA_CCA_DEBUG_PATHS: "${ZAYA_CCA_DEBUG_PATHS:-0}"
    command:                              # entrypoint prepends `vllm serve`
      - ${ZAYA_MODEL_ID:-/models/ZAYA1-8B-fp8}
      - --served-model-name=model
      - -ep
      - -dp=2
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --dtype=bfloat16
      - --tensor-parallel-size=1
      - --max-model-len=${ZAYA_MAX_MODEL_LEN:-32768}
      - --max-num-seqs=${ZAYA_MAX_NUM_SEQS:-16}
      - --max-num-batched-tokens=${ZAYA_MAX_BATCHED:-32768}
      - --mamba-cache-dtype=float32      # CCA conv/temporal state numerics demand float32 (Act VII)
      - --reasoning-parser=qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser=zaya_xml
      - --gpu-memory-utilization=${ZAYA_GPU_MEMORY_UTIL:-0.96}
      # Conservative RDNA4/ROCm cudagraph capture set (see serve; avoids ROCm capture stall + VRAM).
      - --compilation-config=${VLLM_CUDAGRAPH_SIZES:-{"cudagraph_capture_sizes":[1,2,4,8,16,32,64]}}
    healthcheck:                         # so the rsa proxy can wait for a serving backend
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s

  # --- TiDAR serving bring-up: the converted ZAYA1-8B-Diffusion checkpoint (pat883/zaya1-8b-tidar-
  #     experts) as a plain bf16 HF dir (built by repacking model_latest.pt -> safetensors + base
  #     ZAYA config; the tied lm_head dropped). Unlike the fp8 `zaya` profile (-ep -dp=2 replicas,
  #     fits 9 GB), the 16.5 GB bf16 weights need TP=2 to fit 2x16 GB → --tensor-parallel-size=2,
  #     no -ep/-dp. This is the servable substrate for TiDAR throughput / §31g capture; the TiDAR
  #     proposer/mask wiring (tidar_attn_metadata.py carrier + hook) rides on top later. ---
  zaya-tidar:
    <<: *combined-common
    profiles: ["zaya-tidar"]
    container_name: ${LEASE_NAME:-vllm22}-zaya-tidar
    volumes:
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      - ${ZAYA_MODELS_DIR:-/home/pat/code}:/models:ro
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
    ports:
      - "${ZAYA_HOST_PORT:-8000}:8000"
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"
      # bf16 weights: no quantized experts, so the W4A8 kernel never engages — leave it off.
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "${ZAYA_USE_W4A8:-0}"
      ZAYA_CCA_HIP: "${ZAYA_CCA_HIP:-1}"
      ZAYA_CCA_HIP_PREFILL: "${ZAYA_CCA_HIP_PREFILL:-1}"
      ZAYA_CCA_DEBUG_PATHS: "${ZAYA_CCA_DEBUG_PATHS:-0}"
    command:
      - ${ZAYA_MODEL_ID:-/models/zaya1-8b-tidar-serve}
      - --served-model-name=model
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --dtype=bfloat16
      - --tensor-parallel-size=2
      - --max-model-len=${ZAYA_MAX_MODEL_LEN:-32768}
      - --max-num-seqs=${ZAYA_MAX_NUM_SEQS:-16}
      - --max-num-batched-tokens=${ZAYA_MAX_BATCHED:-32768}
      - --mamba-cache-dtype=float32
      - --gpu-memory-utilization=${ZAYA_GPU_MEMORY_UTIL:-0.92}
      - --compilation-config=${VLLM_CUDAGRAPH_SIZES:-{"cudagraph_capture_sizes":[1,2,4,8,16,32,64]}}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 90s

  # --- RSA proxy: Recursive Self-Aggregation test-time compute, OpenAI-compatible shim in front
  #     of the zaya backend. Standalone, client-side, NO GPU (its own tiny image). ---
  rsa:
    build:
      context: .
      dockerfile: Dockerfile.rsa
    image: vllm22-zaya-rsa:combined
    profiles: ["zaya"]
    container_name: vllm22-zaya-rsa
    restart: "no"
    depends_on:
      zaya:
        condition: service_healthy
    ports:
      - "${RSA_HOST_PORT:-8100}:8100"
    volumes:
      - ${ZAYA_MODELS_DIR:-~/models}:/models:ro   # loads the model's HF tokenizer for token-exact tails
    command:
      - --backend=http://zaya:8000/v1
      - --host=0.0.0.0
      - --port=8100
      - --tokenizer=${ZAYA_MODEL_ID:-/models/ZAYA1-8B-fp8}
      # ZAYA1-report RSA config (N=16, K=4, T=2, tau=4096); override per-request via the `rsa` body key.
      - --rsa-n=${RSA_N:-16}
      - --rsa-k=${RSA_K:-4}
      - --rsa-t=${RSA_T:-2}
      - --rsa-tail-tokens=${RSA_TAIL:-4096}

  # --- ZAYA DFlash speculative decoding (M1 plumbing bring-up). ---
  # Layers the non-causal-triton dflash image + our edited zaya.py (aux-hidden-
  # state exposure) + a RANDOM-WEIGHT stub drafter to validate the spec path
  # end-to-end. Acceptance is ~random by design; the real CCA-aware drafter is M2.
  #   scripts/gpu-lease.sh -n 1 --detach --name zaya-dflash -- \
  #     docker compose --profile zaya-dflash up -d
  zaya-dflash:
    <<: *combined-common
    image: vllm22-w4a8:dflash-rxf          # has the non-causal triton_attn patch + RXF + zaya overlay
    profiles: ["zaya-dflash"]
    container_name: ${LEASE_NAME:-vllm22}-zaya-dflash
    volumes:
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      - ${ZAYA_MODELS_DIR:-~/models}:/models:ro
      - ${ZAYA_DFLASH_MODELS_DIR:-/home/pat/code/_models}:/dflash-models:ro
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
      # M1 fast-iteration: overlay the aux-hidden-state edit without an image rebuild.
      # Fold into the image (Dockerfile) once M1 is validated.
      - /home/pat/code/vllm-gfx1201-zaya-dflash/zaya/overlay/vllm/model_executor/models/zaya.py:/app/vllm/vllm/model_executor/models/zaya.py:ro
    ports:
      - "${ZAYA_HOST_PORT:-8000}:8000"
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "${ZAYA_USE_W4A8:-1}"
      # Under spec decode the fused CCA decode kernel auto-disables (needs num_spec==0);
      # the eager CCA verify path runs. Leave prefill HIP on.
      ZAYA_CCA_HIP: "${ZAYA_CCA_HIP:-1}"
      ZAYA_CCA_HIP_PREFILL: "${ZAYA_CCA_HIP_PREFILL:-1}"
    command:
      - ${ZAYA_MODEL_ID:-/models/ZAYA1-8B-fp8}
      - --served-model-name=model
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --dtype=bfloat16
      - --tensor-parallel-size=1
      - --max-model-len=${ZAYA_MAX_MODEL_LEN:-8192}
      - --max-num-seqs=${ZAYA_MAX_NUM_SEQS:-8}
      - --max-num-batched-tokens=${ZAYA_MAX_BATCHED:-8192}
      - --mamba-cache-dtype=float32
      - --enforce-eager                    # DFlash bring-up is eager (matches FINDINGS.md)
      - --gpu-memory-utilization=${ZAYA_GPU_MEMORY_UTIL:-0.90}
      - --speculative-config=${ZAYA_DFLASH_SPEC:-{"model":"/dflash-models/ZAYA1-8B-DFlash-stub","num_speculative_tokens":4,"method":"dflash","attention_backend":"TRITON_ATTN"}}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s

  # --- ZAYA DFlash + 'all'-mode bit-lossless rollback (M5 bring-up). ---
  # Adds the runner patch (threads num_accepted_tokens / prev_last_scheduled_idx to
  # the CCA backend) + 'all' mamba-cache-mode (block-16) so the CCA verify path can
  # roll conv/temporal state to the last-accepted token. ZAYA_SPEC_DEBUG=1 logs a
  # one-shot confirmation that the rollback fields now arrive non-None.
  #   scripts/gpu-lease.sh -n 1 --detach --name zaya-dflash-all -- \
  #     docker compose --profile zaya-dflash-all up -d
  zaya-dflash-all:
    <<: *combined-common
    image: vllm22-w4a8:dflash-rxf
    profiles: ["zaya-dflash-all"]
    container_name: ${LEASE_NAME:-vllm22}-zaya-dflash-all
    volumes:
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      - ${ZAYA_MODELS_DIR:-~/models}:/models:ro
      - ${ZAYA_DFLASH_MODELS_DIR:-/home/pat/code/_models}:/dflash-models:ro
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
      # M5 fast-iteration overlays (fold into the image once validated):
      - /home/pat/code/vllm-gfx1201-zaya-dflash/zaya/overlay/vllm/model_executor/models/zaya.py:/app/vllm/vllm/model_executor/models/zaya.py:ro
      - /home/pat/code/vllm-gfx1201-zaya-dflash/zaya/overlay/vllm/model_executor/layers/mamba/cca.py:/app/vllm/vllm/model_executor/layers/mamba/cca.py:ro
      - /home/pat/code/_models/cca_all_mode/gpu_model_runner.py:/app/vllm/vllm/v1/worker/gpu_model_runner.py:ro
    ports:
      - "${ZAYA_HOST_PORT:-8000}:8000"
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "${ZAYA_USE_W4A8:-1}"
      ZAYA_CCA_HIP: "${ZAYA_CCA_HIP:-1}"
      ZAYA_CCA_HIP_PREFILL: "${ZAYA_CCA_HIP_PREFILL:-1}"
      ZAYA_SPEC_ALL: "1"             # make ZayaForCausalLM advertise mamba prefix caching -> 'all' mode
      ZAYA_SPEC_DEBUG: "1"           # one-shot log: are the rollback fields non-None now?
    command:
      - ${ZAYA_MODEL_ID:-/models/ZAYA1-8B-fp8}
      - --served-model-name=model
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --dtype=bfloat16
      - --tensor-parallel-size=1
      - --max-model-len=${ZAYA_MAX_MODEL_LEN:-8192}
      - --max-num-seqs=${ZAYA_MAX_NUM_SEQS:-8}
      - --max-num-batched-tokens=${ZAYA_MAX_BATCHED:-8192}
      - --mamba-cache-dtype=float32
      - --enable-prefix-caching
      - --mamba-cache-mode=all
      - --mamba-block-size=16
      - --enforce-eager
      - --gpu-memory-utilization=${ZAYA_GPU_MEMORY_UTIL:-0.90}
      - --speculative-config=${ZAYA_DFLASH_SPEC:-{"model":"/dflash-models/ZAYA1-8B-DFlash-stub","num_speculative_tokens":4,"method":"dflash","attention_backend":"TRITON_ATTN"}}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s

  # --- Bit-identity BASELINE: 'all' mamba-cache-mode, num_spec=0 (NO speculative-config). ---
  # Same code path as zaya-dflash-all (all/block-16/prefix-caching/eager, the cca.py rollback +
  # runner-patch overlays) but with speculation OFF. This is the reference the ngram-spec run is
  # diffed against (zaya/dflash/bitident_client.py): identical greedy token ids => the CCA
  # 'all'-mode partial-acceptance rollback is bit-lossless. Also exercises the 'all'-mode prefill
  # column-0 slot-write at num_spec=0 (cca.py:319) so a first-token offset would show as a diff.
  #   scripts/gpu-lease.sh -n 1 --detach --name zaya-bi-all -- \
  #     docker compose --profile zaya-bi-all-nospec up -d
  zaya-bi-all-nospec:
    <<: *combined-common
    image: vllm22-w4a8:dflash-rxf
    profiles: ["zaya-bi-all-nospec"]
    container_name: ${LEASE_NAME:-vllm22}-zaya-bi-all-nospec
    volumes:
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      - ${ZAYA_MODELS_DIR:-~/models}:/models:ro
      - ${ZAYA_DFLASH_MODELS_DIR:-/home/pat/code/_models}:/dflash-models:ro
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
      - /home/pat/code/vllm-gfx1201-zaya-dflash/zaya/overlay/vllm/model_executor/models/zaya.py:/app/vllm/vllm/model_executor/models/zaya.py:ro
      - /home/pat/code/vllm-gfx1201-zaya-dflash/zaya/overlay/vllm/model_executor/layers/mamba/cca.py:/app/vllm/vllm/model_executor/layers/mamba/cca.py:ro
      - /home/pat/code/_models/cca_all_mode/gpu_model_runner.py:/app/vllm/vllm/v1/worker/gpu_model_runner.py:ro
    ports:
      - "${ZAYA_HOST_PORT:-8000}:8000"
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "${ZAYA_USE_W4A8:-1}"
      ZAYA_CCA_HIP: "${ZAYA_CCA_HIP:-1}"
      ZAYA_CCA_HIP_PREFILL: "${ZAYA_CCA_HIP_PREFILL:-1}"
      ZAYA_SPEC_ALL: "1"             # advertise mamba prefix caching -> 'all' mode (same as spec run)
    command:
      - ${ZAYA_MODEL_ID:-/models/ZAYA1-8B-fp8}
      - --served-model-name=model
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --dtype=bfloat16
      - --tensor-parallel-size=1
      - --max-model-len=${ZAYA_MAX_MODEL_LEN:-8192}
      - --max-num-seqs=${ZAYA_MAX_NUM_SEQS:-8}
      - --max-num-batched-tokens=${ZAYA_MAX_BATCHED:-8192}
      - --mamba-cache-dtype=float32
      - --enable-prefix-caching
      - --mamba-cache-mode=all
      - --mamba-block-size=16
      - --enforce-eager
      - --gpu-memory-utilization=${ZAYA_GPU_MEMORY_UTIL:-0.90}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s

  # --- Bit-identity REFERENCE: align mamba-cache-mode, num_spec=0 (NO speculative-config). ---
  # Canonical greedy ZAYA in the same eager/TP=1 shape but the DEFAULT align cache mode (no 'all',
  # no prefix caching, no runner patch). Diffing this vs zaya-bi-all-nospec closes the
  # cca-all-mode-spec-plan "prereq decision 1" gate: block-size-16 'all' == align greedy.
  #   scripts/gpu-lease.sh -n 1 --detach --name zaya-bi-align -- \
  #     docker compose --profile zaya-bi-align-nospec up -d
  zaya-bi-align-nospec:
    <<: *combined-common
    image: vllm22-w4a8:dflash-rxf
    profiles: ["zaya-bi-align-nospec"]
    container_name: ${LEASE_NAME:-vllm22}-zaya-bi-align-nospec
    volumes:
      - ${HF_HOME:-./.hf-cache}:/root/.cache/huggingface
      - ${ZAYA_MODELS_DIR:-~/models}:/models:ro
      - ${VLLM_HOST_TRITON_CACHE:-./.triton-cache-combined}:/root/.triton
      - /home/pat/code/vllm-gfx1201-zaya-dflash/zaya/overlay/vllm/model_executor/models/zaya.py:/app/vllm/vllm/model_executor/models/zaya.py:ro
      - /home/pat/code/vllm-gfx1201-zaya-dflash/zaya/overlay/vllm/model_executor/layers/mamba/cca.py:/app/vllm/vllm/model_executor/layers/mamba/cca.py:ro
    ports:
      - "${ZAYA_HOST_PORT:-8000}:8000"
    environment:
      <<: *combined-env
      ROCR_VISIBLE_DEVICES: "${LEASE_ROCR_DEVICES:-0,1}"
      HIP_VISIBLE_DEVICES: "${LEASE_HIP_DEVICES:-0,1}"
      VLLM_ROCM_USE_W4A8_FP8_WMMA: "${ZAYA_USE_W4A8:-1}"
      ZAYA_CCA_HIP: "${ZAYA_CCA_HIP:-1}"
      ZAYA_CCA_HIP_PREFILL: "${ZAYA_CCA_HIP_PREFILL:-1}"
    command:
      - ${ZAYA_MODEL_ID:-/models/ZAYA1-8B-fp8}
      - --served-model-name=model
      - --host=0.0.0.0
      - --port=8000
      - --trust-remote-code
      - --dtype=bfloat16
      - --tensor-parallel-size=1
      - --max-model-len=${ZAYA_MAX_MODEL_LEN:-8192}
      - --max-num-seqs=${ZAYA_MAX_NUM_SEQS:-8}
      - --max-num-batched-tokens=${ZAYA_MAX_BATCHED:-8192}
      - --mamba-cache-dtype=float32
      - --enforce-eager
      - --gpu-memory-utilization=${ZAYA_GPU_MEMORY_UTIL:-0.90}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s
