# Auto-provisioned Grafana datasource → the local Prometheus (same compose network).
# Makes the monitoring stack turnkey: `--profile monitoring up -d` then open :3000 and
# Prometheus is already wired as the default datasource (import any vLLM dashboard, e.g.
# Grafana dashboard ID 23991 / the upstream vllm/examples/online_serving grafana.json).
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
