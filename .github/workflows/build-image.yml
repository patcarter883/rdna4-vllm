# Build (and optionally push) the gfx1201 vLLM combined image.
#
# IMPORTANT — runner choice. The base image tcclaviger/vllm22:dev is ~28 GB (pinned by
# digest in Dockerfile.combined). A stock GitHub-hosted ubuntu runner has ~14 GB free and
# ~25 GB more after aggressive cleanup (~39 GB total) — marginal for pulling the base AND
# assembling the image. The intended runner is a SELF-HOSTED one on a gfx1201 host (it has
# the disk, usually already caches the base layer, and can run the real GPU smoke test).
# Give that runner a single label (e.g. `gfx1201`) and pass it as the `runner` input. The
# default ubuntu-latest path is best-effort and may run out of disk on the W4A8 build.
#
# The build does NOT need a GPU — hipcc cross-compiles the W4A8 kernel to gfx1201 ISA
# without a device present. Only the optional gpu-smoke job needs hardware.

name: build-image

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner label (single label; use a self-hosted gfx1201 label for a reliable build)"
        type: string
        default: "ubuntu-latest"
      with_het_tp:
        description: "Apply heterogeneous-TP 64:56 sharding (needs a real patches/het_tp_vllm.patch)"
        type: choice
        options: ["0", "1"]
        default: "0"
      push:
        description: "Push the image to GHCR"
        type: boolean
        default: true
      gpu_smoke:
        description: "Run a real GPU smoke test after the build (needs a self-hosted [self-hosted, gfx1201] runner; requires push=true)"
        type: boolean
        default: false
  push:
    tags: ["v*"]          # tag releases auto-build + push

permissions:
  contents: read
  packages: write          # GHCR push via GITHUB_TOKEN

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/patcarter883/rdna4-vllm

jobs:
  # ---------------------------------------------------------------------------
  # Non-GPU lint/sanity. Runs on every push + PR; no hardware, no base-image pull.
  # Catches the cheap regressions (broken compose, a patch helper that no longer
  # self-tests, an unparseable patched file) before anyone burns a GPU window.
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: docker compose config is valid
        run: docker compose config -q
      - name: het_tp helper CPU self-tests
        run: pip install -q torch --index-url https://download.pytorch.org/whl/cpu && python patches/het_tp.py
      - name: patched Python files parse
        run: python -c "import ast,glob,sys; [ast.parse(open(f).read(), f) for f in glob.glob('patches/*.py')]; print('ast ok')"
      - name: shell scripts parse
        run: bash -n scripts/*.sh

  build:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      # Reclaim ~25 GB on GitHub-hosted runners (skipped on self-hosted).
      - name: Free disk space
        if: ${{ runner.environment == 'github-hosted' }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune -af || true
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' || inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags / labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.combined
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            WITH_HET_TP=${{ github.event_name == 'workflow_dispatch' && inputs.with_het_tp || '0' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Optional: real generation on gfx1201 hardware. Runs only when explicitly
  # requested (and the image was pushed) AND a self-hosted gfx1201 runner exists.
  gpu-smoke:
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.gpu_smoke && inputs.push }}
    runs-on: [self-hosted, gfx1201]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Serve + smoke (single GPU, small model)
        env:
          IMG: ${{ env.IMAGE }}:latest
        run: |
          docker pull "$IMG"
          cid=$(docker run -d --rm \
            --device=/dev/kfd --device=/dev/dri --group-add video \
            --security-opt seccomp=unconfined --ipc=host --shm-size=16g \
            -e ROCR_VISIBLE_DEVICES=0 -e HF_HUB_OFFLINE=1 \
            -e PATH=/opt/rocm-7.2.1/lib/llvm/bin:/app/.venv/bin:/usr/local/bin:/usr/bin:/bin \
            -v "${HF_HOME:-$HOME/.cache/huggingface}:/root/.cache/huggingface" \
            -v "${RUNNER_TEMP}/triton-cache:/root/.triton" \
            -p 8000:8000 "$IMG" \
            vllm serve "${SMOKE_MODEL_ID:-cyankiwi/Mellum2-12B-A2.5B-Instruct-AWQ-INT4}" \
              --host 0.0.0.0 --port 8000 --enforce-eager \
              --limit-mm-per-prompt '{"image":0,"video":0}' \
              --max-model-len 4096)
          trap 'docker logs "$cid" | tail -50; docker stop "$cid" || true' EXIT
          ./scripts/smoke.sh localhost:8000
